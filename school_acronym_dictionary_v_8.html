<style>
body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#0a2a66,#123b8a);display:flex;justify-content:center;align-items:center;min-height:100vh;}
.dark{background:#111;color:white;}
.container{background:white;padding:30px;border-radius:18px;width:95%;max-width:1200px;max-height:90vh;overflow:auto;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.dark .container{background:#222;}
h1{color:#0a2a66;margin-bottom:5px;}
.search{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}
input{flex:1;padding:12px;border-radius:25px;border:2px solid #123b8a;}
button{padding:10px 15px;border:none;border-radius:25px;background:#f4b400;cursor:pointer;font-weight:bold;}
button:hover{background:#e0a400;}
.category{font-weight:bold;margin-top:18px;color:#0a2a66;}
.item{padding:5px;border-bottom:1px solid #ddd;text-align:left;}
.day{background:#f4b400;padding:8px;border-radius:8px;margin-bottom:10px;font-weight:bold;}
.counter{font-size:14px;margin-bottom:10px;}
@media(max-width:600px){.search{flex-direction:column;}button{width:100%;}}
</style>

<div class="container">
<h1>School Acronym Dictionary</h1>
<div class="counter" id="counter"></div>
<div class="day" id="day"></div>
<div class="search">
<input id="search" placeholder="Search acronym or keyword">
<button onclick="search()">Search</button>
<button onclick="showAll()">Show All</button>
<button onclick="randomAcronym()">Random</button>
<button onclick="toggleDark()">Dark</button>

function countAcronyms(){
  let total=0;
  for(const cat in acronyms){
    for(const key in acronyms[cat]) total+=acronyms[cat][key].length;
  }
  return total;
}
document.getElementById("counter").innerText=countAcronyms()+" acronyms in database";

function acronymOfDay(){
  const allKeys=[];
  for(const cat in acronyms){
    for(const key in acronyms[cat]){
      acronyms[cat][key].forEach(def=>allKeys.push({key,keyDef:def}));
    }
  }
  const r=allKeys[Math.floor(Math.random()*allKeys.length)];
  document.getElementById("day").innerText="Acronym of the Day: "+r.key+" — "+r.keyDef;
}
acronymOfDay();

function search(){
  const input=document.getElementById("search").value.toUpperCase();
  const results=document.getElementById("results");
  results.innerHTML="";
  let found=false;
  for(const cat in acronyms){
    for(const key in acronyms[cat]){
      acronyms[cat][key].forEach(def=>{
        if(key.toUpperCase().includes(input) || def.toUpperCase().includes(input)){
          const div=document.createElement("div");
          div.className="item";
          div.innerHTML="<b>"+key+"</b>: "+def;
          results.appendChild(div);
          found=true;
        }
      });
    }
  }
  if(!found) results.innerHTML="No acronyms found.";
}

function showAll(){
  const results=document.getElementById("results");
  results.innerHTML="";
  for(const cat in acronyms){
    const title=document.createElement("div");
    title.className="category";
    title.innerText=cat;
    results.appendChild(title);
    for(const key in acronyms[cat]){
      acronyms[cat][key].forEach(def=>{
        const div=document.createElement("div");
        div.className="item";
        div.innerHTML="<b>"+key+"</b>: "+def;
        results.appendChild(div);
      });
    }
  }
}

function randomAcronym(){
  const allKeys=[];
  for(const cat in acronyms){
    for(const key in acronyms[cat]){
      acronyms[cat][key].forEach(def=>allKeys.push({key,keyDef:def}));
    }
  }
  const r=allKeys[Math.floor(Math.random()*allKeys.length)];
  alert(r.key+" : "+r.keyDef);
}

function toggleDark(){document.body.classList.toggle("dark");}

document.getElementById("search").addEventListener("input",function(){
  const input=this.value.toUpperCase();
  const results=document.getElementById("results");
  results.innerHTML="";
  if(input==="") return;
  for(const cat in acronyms){
    for(const key in acronyms[cat]){
      acronyms[cat][key].forEach(def=>{
        if(key.toUpperCase().startsWith(input) || def.toUpperCase().includes(input)){
          const div=document.createElement("div");
          div.className="item";
          div.innerHTML="<b>"+key+"</b>: "+def;
          results.appendChild(div);
        }
      });
    }
  }
});
</script>
